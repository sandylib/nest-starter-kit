# ================================================
# Local Development Database Setup
# ================================================
# This docker-compose file is for LOCAL DEVELOPMENT ONLY
# Do NOT use this in production environments
#
# Usage:
#   Start:  docker compose -f docker-compose.db.yml up -d
#   Stop:   docker compose -f docker-compose.db.yml down
#   Logs:   docker compose -f docker-compose.db.yml logs -f
#   Reset:  docker compose -f docker-compose.db.yml down -v
# ================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: nest-starter-kit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nest_starter_kit_local
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
